name: venv
channels:
    - conda-forge
    - defaults
dependencies:
    # Base Python environment
    - python=3.10

    # Core conda packages (installed first for better dependency resolution)
    - numpy=1.26.4 # Compatible with both TensorFlow and RDKit
    - scipy=1.13.1
    - pandas=2.2.3
    - matplotlib=3.9.4
    - seaborn=0.13.2
    - plotly=5.14.1
    - scikit-learn=1.5.2
    - networkx=3.4.2
    - joblib=1.4.2
    - tqdm=4.66.6
    - statsmodels=0.14.5
    - ipython=8.29.0

    # Quantum Chemistry packages (conda-forge)
    - psi4=1.9.1
    - qcelemental=0.29.0
    - qcengine=0.33.0
    - optking=0.4.2
    - pcmsolver=1.2.3
    - pint=0.24.4

    # Django and web framework packages

    - djangorestframework=3.14.0
    - django-cors-headers=4.3.1
    - celery=5.4.0

    # Additional conda packages
    - pyyaml=6.0.3
    - packaging=25.0
    - platformdirs=4.4.0

    # pip packages (installed after conda packages)
    - pip
    - pip:
          # Core Python packages
          - numpy<2.0 # Ensure NumPy 1.x compatibility

          # Machine Learning packages
          - tensorflow==2.20.0
          - torch==2.0.1
          - torch-geometric==2.4.0
          - xgboost==2.1.4
          - catboost==1.2.8
          - lightgbm==4.6.0
          - lazypredict==0.2.16
          - category-encoders==2.6.4

          # Chemistry and molecular packages
          - rdkit==2022.9.5
          - pubchempy==1.0.5

          # Data processing and visualization
          - dask==2023.3.2
          - upsetplot==0.9.0
          - matplotlib-venn==1.1.2

          # Utilities
          - pyswarm==0.6
          - pathlib==1.0.1
          - numpyencoder==0.3.2
          - pdfminer.six==20231228
          - redis==6.4.0

          # Chatbot and AI packages
          - ollama==0.6.0

          # MLflow and related packages
          - mlflow==3.4.0
          - fastapi==0.118.0
          - uvicorn==0.37.0
          - django==5.1.13
